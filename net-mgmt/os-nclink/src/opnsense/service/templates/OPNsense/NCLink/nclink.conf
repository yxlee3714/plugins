{% if helpers.exists('OPNsense.nclink.general.enabled') and OPNsense.nclink.general.enabled == '1' %}
enabled=YES
{% else %}
enabled=NO
{% endif %}
{% if helpers.exists('OPNsense.nclink.general.listen_port') %}
listen_port={{ OPNsense.nclink.general.listen_port }}
{% else %}
listen_port=8088
{% endif %}
{% if helpers.exists('OPNsense.nclink.general.device_uuid') %}
device_uuid={{ OPNsense.nclink.general.device_uuid }}
{% else %}
device_uuid=test-device-001
{% endif %}
{% if helpers.exists('OPNsense.nclink.general.protocol_version') %}
protocol_version={{ OPNsense.nclink.general.protocol_version }}
{% else %}
protocol_version=1.0
{% endif %}
